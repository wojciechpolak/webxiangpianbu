[supervisord]
user=root
nodaemon=true

[unix_http_server]
file = /tmp/supervisord.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisord]
logfile = /var/log/supervisord.log
logfile_maxbytes = 5MB
logfile_backups = 1
pidfile = /var/run/supervisord.pid

[supervisorctl]
serverurl = unix:///tmp/supervisord.sock

[program:webxiang]
command=gunicorn webxiang.wsgi:application --bind 0.0.0.0:80 --workers 2 --user www-data --group users --access-logfile /dev/stdout --error-logfile /dev/stderr --log-level info
environment=DJANGO_SETTINGS_MODULE=run.settings_docker
stopsignal=TERM
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
