name: PR Checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    name: Ruff, mypy, and pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install development dependencies
        run: uv sync --locked --group dev

      - name: Prepare Django settings for CI
        run: |
          if [ ! -f webxiang/settings.py ]; then
            cp webxiang/settings_sample.py webxiang/settings.py
            sed -i "s/SECRET_KEY = os.getenv('WEBXIANG_SECRET_KEY', '')/SECRET_KEY = 'secret'/g" webxiang/settings.py
          fi
          mkdir -p static
          uv run manage.py collectstatic --no-input

      - name: Install Playwright Chromium
        run: uv run python -m playwright install --with-deps chromium

      - name: Run ruff
        run: uv run ruff check

      - name: Run ty
        run: uv run ty check

      - name: Run mypy
        run: uv run mypy .

      - name: Run pytest
        run: uv run pytest

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-playwright
          path: test-results/playwright
          if-no-files-found: ignore
